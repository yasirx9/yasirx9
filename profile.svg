<g clip-path="url(#lc9)"><text x="520" y="0"><tspan x="520" y="294" class="cc">. </tspan><tspan class="key">Languages</tspan><tspan class="cc">:</tspan><tspan x="670" class="value">Python, Java, JavaScript</tspan></text></g>
<g clip-path="url(#lc10)"><text x="520" y="0"><tspan x="520" y="322" class="cc">. </tspan><tspan class="key">ML.Tools</tspan><tspan class="cc">:</tspan><tspan x="670" class="value">Scikit-learn, Jupyter, Pandas</tspan></text></g>
<g clip-path="url(#lc11)"><text x="520" y="0"><tspan x="520" y="350" class="cc">. </tspan><tspan class="key">Dev.Tools</tspan><tspan class="cc">:</tspan><tspan x="670" class="value">Git, GitHub, VS Code</tspan></text></g>
