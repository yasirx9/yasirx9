    <rect x="8" y="8" width="1084" height="40" fill="#101733"/>
    <line x1="8" y1="48" x2="1092" y2="48" stroke="#22284a" stroke-width="1"/>
    <circle cx="34" cy="28" r="6" fill="#ff5f57"/>
    <circle cx="54" cy="28" r="6" fill="#febc2e"/>
    <circle cx="74" cy="28" r="6" fill="#28c840"/>
    <text x="550" y="33" text-anchor="middle" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#8b93b8">yasir@devOS ~ % ./profile.sh --live</text>

    <!-- animated typing/erasing SCANNING label -->
    <circle cx="1030" cy="28" r="4" fill="#ff5f57">
      <animate attributeName="opacity" values="1;0.15;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="1042" y="32" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#ff5f57" letter-spacing="1" clip-path="url(#scanClip)">SCANNING</text>

    <!-- left panel: VISUAL.MAP (generated from the uploaded photo) -->
    <text x="40" y="82" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#5ee7ff" letter-spacing="2">VISUAL.MAP</text>
    <line x1="40" y1="92" x2="470" y2="92" stroke="#22284a" stroke-width="1"/>
    <g>
__DOTS__
