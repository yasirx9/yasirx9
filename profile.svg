  <rect x="522" y="481" width="9" height="16" class="cursor-blink" opacity="0">
    <animate attributeName="opacity" values="0;0;1;0;1;0;1;0" keyTimes="0;0.01;0.02;0.3;0.5;0.7;0.85;1" dur="1.4s" begin="2.81s" repeatCount="indefinite"/>
  </rect>

</g>

<!-- Outer glowing border simulation using opacity animation -->
<rect x="3" y="3" width="1174" height="604" rx="16" fill="none" stroke="#7C3AED" stroke-width="2" opacity="0.8">
  <animate attributeName="opacity" values="0.5;0.95;0.5" dur="3.2s" repeatCount="indefinite"/>
</rect>
