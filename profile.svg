<svg viewBox="0 0 1100 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1f"/>
      <stop offset="100%" stop-color="#0d1326"/>
    </linearGradient>
    <linearGradient id="borderGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5ee7ff"/>
      <stop offset="100%" stop-color="#7c5cff"/>
    </linearGradient>
    <clipPath id="outer">
      <rect x="8" y="8" width="1084" height="604" rx="14"/>
    </clipPath>
    <clipPath id="scanClip">
      <rect x="1040" y="20" width="0" height="18">
        <animate attributeName="width"
          dur="2.6s" repeatCount="indefinite"
          calcMode="linear"
          keyTimes="0;0.269;0.5;0.769;1"
          values="0;68;68;0;0"/>
      </rect>
    </clipPath>
  </defs>

  <rect x="4" y="4" width="1092" height="612" rx="16" fill="none" stroke="url(#borderGlow)" stroke-width="1.5" opacity="0.55"/>
  <rect x="8" y="8" width="1084" height="604" rx="14" fill="url(#bg)"/>

  <g clip-path="url(#outer)">
