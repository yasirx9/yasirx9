<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&amp;display=swap');

    .key    { font-family: 'Lexend', sans-serif; font-size: 15px; fill: #22D3EE; font-weight: 600; }
    .value  { font-family: 'Lexend', sans-serif; font-size: 15px; fill: #E5E7EB; }
    .cc     { font-family: 'Lexend', sans-serif; font-size: 15px; fill: #475569; }
    .head   { font-family: 'Lexend', sans-serif; font-size: 17px; fill: #7C3AED; font-weight: 700; }
    .accent { font-family: 'Lexend', sans-serif; font-size: 15px; fill: #10B981; font-weight: 700; }
    text, tspan { white-space: pre; }

    .term-label { font-family: 'Lexend', sans-serif; font-size: 12px; fill: #64748B; letter-spacing: 0.5px; }
    .scan-label { font-family: 'Lexend', sans-serif; font-size: 10px; fill: #F87171; letter-spacing: 1px; font-weight: 700; }
    .panel-title { font-family: 'Lexend', sans-serif; font-size: 11px; fill: #38BDF8; letter-spacing: 2px; opacity: 0.7; font-weight: 600; }
    .cursor-blink { fill: #22D3EE; }
    .name-tag { font-family: 'Lexend', sans-serif; font-size: 22px; fill: #E5E7EB; font-weight: 700; }
    .handle-tag { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 13px; fill: #22D3EE; }
    .chip-text { font-family: 'Lexend', sans-serif; font-size: 11px; fill: #A5B4FC; font-weight: 600; }
    .status-text { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 10px; fill: #10B981; letter-spacing: 1px; }
  </style>

  <mask id="revealMask" maskUnits="userSpaceOnUse" x="0" y="0" width="1180" height="620">
    <rect x="0" y="0" width="1180" height="0" fill="#fff">
      <animate attributeName="height" from="0" to="560" dur="2.6s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    </rect>
  </mask>

  <clipPath id="photoClip">
    <circle cx="258" cy="216" r="138"/>
  </clipPath>

  <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7C3AED"/>
    <stop offset="50%" stop-color="#22D3EE"/>
    <stop offset="100%" stop-color="#10B981"/>
  </linearGradient>

  <clipPath id="scanClip">
    <circle cx="258" cy="216" r="138"/>
  </clipPath>

  <clipPath id="lc0"><rect x="500" y="26.00" width="0" height="28"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="0.75s" fill="freeze"/></rect></clipPath>
<clipPath id="lc1"><rect x="500" y="54.00" width="0" height="28"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="0.86s" fill="freeze"/></rect></clipPath>
<clipPath id="lc2"><rect x="500" y="82.00" width="0" height="28"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="0.97s" fill="freeze"/></rect></clipPath>
<clipPath id="lc3"><rect x="500" y="110.00" width="0" height="28"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="1.08s" fill="freeze"/></rect></clipPath>
<clipPath id="lc4"><rect x="500" y="138.00" width="0" height="28"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="1.19s" fill="freeze"/></rect></clipPath>
<clipPath id="lc5"><rect x="500" y="166.00" width="0" height="28"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="1.30s" fill="freeze"/></rect></clipPath>
<clipPath id="lc6"><rect x="500" y="194.00" width="0" height="28"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="1.41s" fill="freeze"/></rect></clipPath>
<clipPath id="lc7"><rect x="500" y="222.00" width="0" height="28"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="1.52s" fill="freeze"/></rect></clipPath>
<clipPath id="lc8"><rect x="500" y="250.00" width="0" height="28"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="1.63s" fill="freeze"/></rect></clipPath>
<clipPath id="lc9"><rect x="500" y="278.00" width="0" height="28"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="1.74s" fill="freeze"/></rect></clipPath>
<clipPath id="lc10"><rect x="500" y="306.00" width="0" height="28"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="1.85s" fill="freeze"/></rect></clipPath>
<clipPath id="lc11"><rect x="500" y="334.00" width="0" height="28"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="1.96s" fill="freeze"/></rect></clipPath>
<clipPath id="lc12"><rect x="500" y="362.00" width="0" height="28"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="2.07s" fill="freeze"/></rect></clipPath>
<clipPath id="lc13"><rect x="500" y="390.00" width="0" height="28"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="2.18s" fill="freeze"/></rect></clipPath>
<clipPath id="lc14"><rect x="500" y="418.00" width="0" height="28"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="2.29s" fill="freeze"/></rect></clipPath>
<clipPath id="lc15"><rect x="500" y="446.00" width="0" height="28"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="2.40s" fill="freeze"/></rect></clipPath>

</defs>

<!-- Solid background -->
<rect width="1180" height="610" rx="18" fill="#0B1120"/>

<!-- Title bar -->
<g id="titlebar">
  <rect x="3" y="3" width="1174" height="34" rx="16" fill="#0B1120" fill-opacity="0.85"/>
  <circle cx="24" cy="20" r="5" fill="#EF4444"><animate attributeName="opacity" values="1;0.55;1" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="42" cy="20" r="5" fill="#F59E0B"><animate attributeName="opacity" values="1;0.55;1" dur="4s" begin="0.3s" repeatCount="indefinite"/></circle>
  <circle cx="60" cy="20" r="5" fill="#10B981"><animate attributeName="opacity" values="1;0.55;1" dur="4s" begin="0.6s" repeatCount="indefinite"/></circle>
  <text x="590" y="25" text-anchor="middle" class="term-label">yasir@devOS ~ % ./profile.sh --live</text>
  <circle cx="1090" cy="20" r="4" fill="#F87171">
    <animate attributeName="opacity" values="1;0.15;1" dur="1.1s" repeatCount="indefinite"/>
  </circle>
  <text x="1100" y="24" class="scan-label">SCANNING</text>
</g>

<!-- Main panels -->
<g transform="translate(0,38)">
  <rect x="14" y="26" width="488" height="468" rx="14" fill="#0B1120" fill-opacity="0.35" stroke="#7C3AED" stroke-width="1" opacity="0.35"/>
  <rect x="508" y="10" width="655" height="500" rx="14" fill="#0B1120" fill-opacity="0.35" stroke="#7C3AED" stroke-width="1" opacity="0.35"/>
  <text x="30" y="24" class="panel-title">IDENTITY.SCAN</text>
  <text x="524" y="24" class="panel-title">SYSTEM.INFO</text>

  <g mask="url(#revealMask)">

    <!-- Photo + reticle -->
    <g>
      <circle cx="258" cy="216" r="146" fill="none" stroke="url(#ringGrad)" stroke-width="2" opacity="0.9">
        <animate attributeName="stroke-dasharray" values="0 920;920 0" dur="1.6s" begin="0.4s" fill="freeze"/>
      </circle>
      <circle cx="258" cy="216" r="152" fill="none" stroke="#22D3EE" stroke-width="1" opacity="0.25"/>

      <image href="https://avatars.githubusercontent.com/u/166010451?v=4" x="118" y="76" width="280" height="280" clip-path="url(#photoClip)" preserveAspectRatio="xMidYMid slice"/>

      <!-- scanning sweep -->
      <g clip-path="url(#scanClip)">
        <rect x="118" y="76" width="280" height="10" fill="#22D3EE" opacity="0.35">
          <animate attributeName="y" values="76;346;76" dur="3.6s" begin="2.1s" repeatCount="indefinite"/>
        </rect>
      </g>

      <!-- corner reticle brackets -->
      <g stroke="#38BDF8" stroke-width="2" fill="none" opacity="0.8">
        <path d="M96,96 L96,116 M96,96 L116,96"/>
        <path d="M420,96 L420,116 M420,96 L400,96"/>
        <path d="M96,336 L96,316 M96,336 L116,336"/>
        <path d="M420,336 L420,316 M420,336 L400,336"/>
      </g>

      <text x="258" y="392" text-anchor="middle" class="name-tag">Muhammad Yasir Ishfaq</text>
      <text x="258" y="415" text-anchor="middle" class="handle-tag">github.com/yasirx9</text>

      <!-- skill chips -->
      <g>
        <rect x="70" y="434" width="70" height="24" rx="12" fill="#1E293B" stroke="#7C3AED" stroke-width="1" opacity="0.9"/>
        <text x="105" y="450" text-anchor="middle" class="chip-text">Python</text>

        <rect x="150" y="434" width="66" height="24" rx="12" fill="#1E293B" stroke="#22D3EE" stroke-width="1" opacity="0.9"/>
        <text x="183" y="450" text-anchor="middle" class="chip-text">ML/NLP</text>

        <rect x="226" y="434" width="54" height="24" rx="12" fill="#1E293B" stroke="#10B981" stroke-width="1" opacity="0.9"/>
        <text x="253" y="450" text-anchor="middle" class="chip-text">Java</text>

        <rect x="290" y="434" width="90" height="24" rx="12" fill="#1E293B" stroke="#F59E0B" stroke-width="1" opacity="0.9"/>
        <text x="335" y="450" text-anchor="middle" class="chip-text">JavaScript</text>
      </g>

      <text x="258" y="478" text-anchor="middle" class="status-text">STATUS: OPEN_TO_OPPORTUNITIES</text>
    </g>

  </g>

  <g clip-path="url(#lc0)"><text x="520" y="0"><tspan x="520" y="42" class="head">yasir@devOS</tspan><tspan class="cc"> -——————————————————————————————————————————-—-</tspan></text></g>
<g clip-path="url(#lc1)"><text x="520" y="0"><tspan x="520" y="70" class="cc">. </tspan><tspan class="key">I am</tspan><tspan class="cc">:</tspan><tspan x="670" class="value">Muhammad Yasir Ishfaq</tspan></text></g>
